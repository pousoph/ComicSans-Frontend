# Edge nginx: único contenedor público (:80).
# Balancea entre réplicas de cada frontend vía DNS round-robin de Docker
# y proxea /api/ al api-gateway del backend en la red compartida.

upstream pos_upstream {
    server tienda-pos:80 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream admin_upstream {
    server tienda-admin:80 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream api_gateway {
    server api-gateway:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 10M;

    # ── API → backend api-gateway ───────────────────────────
    location /api/ {
        proxy_pass http://api_gateway/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Admin SPA ───────────────────────────────────────────
    location /admin/ {
        proxy_pass http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Connection "";
    }

    location = /admin {
        return 301 /admin/;
    }

    # ── Health del edge ─────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── POS SPA (catch-all) ─────────────────────────────────
    location / {
        proxy_pass http://pos_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Connection "";
    }
}
